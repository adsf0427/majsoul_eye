[pytest]
# Anchor rootdir HERE even when this repo is embedded as a submodule under a
# superproject that carries its own pytest.ini + root conftest.py. Without
# this file pytest walks upward, adopts the parent's rootdir, loads the
# parent's conftest (which puts the parent root on sys.path, where a REGULAR
# `scripts` package shadows this repo's namespace `scripts.*` imports), and
# inherits the parent's pythonpath/timeout options.
pythonpath = .
testpaths = tests
addopts = -q
